# Render Blueprint — 一鍵部署設定
# 推到 GitHub 後，在 Render 點 New + → Blueprint → 選這個 repo，即可自動套用。
services:
  - type: web
    name: poe2-divine-compare
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: POE2_LEAGUE
        value: Runes of Aldur
